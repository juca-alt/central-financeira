name: Sync Pluggy (Nubank/Inter PF/C6) → Supabase

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN (true = só simula, false = grava)"
        required: false
        default: "true"
      discover:
        description: "DISCOVER (true = só lista accounts/saldos pra mapear conta_id)"
        required: false
        default: "false"
      sync_days:
        description: "Quantos dias pra trás"
        required: false
        default: "90"
  # Piloto automático: DESLIGADO até a Fase B (sem os secrets PLUGGY_* o run falha e
  # gera e-mail de erro). Quando conectar os bancos e cadastrar os secrets, DESCOMENTE
  # o bloco abaixo pra ligar o cron diário (06h40 BRT). Folgado no rate-limit Pluggy.
  # O sync força PATCH /items, então o dado vem fresco — não depende do auto-sync da Pluggy.
  # schedule:
  #   - cron: "40 9 * * *"   # 09:40 UTC = 06:40 BRT

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Rodar sync Pluggy
        env:
          # --- Secrets (cadastre no GitHub a partir de dashboard.pluggy.ai) ---
          PLUGGY_CLIENT_ID: ${{ secrets.PLUGGY_CLIENT_ID }}
          PLUGGY_CLIENT_SECRET: ${{ secrets.PLUGGY_CLIENT_SECRET }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # --- Config não-sigilosa (fixa, igual aos outros syncs) ---
          SUPABASE_URL: https://mieqsiojvfiqrhectquc.supabase.co
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          DISCOVER: ${{ github.event.inputs.discover || 'false' }}
          SYNC_DAYS: ${{ github.event.inputs.sync_days || '7' }}
        run: node scripts/sync-pluggy.mjs
