name: Sync Inter PJ → Supabase

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN (true = só simula, false = grava)"
        required: false
        default: "true"
      sync_days:
        description: "Quantos dias pra trás (máx 90)"
        required: false
        default: "30"
  # Piloto automático: descomentar depois da 1ª rodada validada
  # schedule:
  #   - cron: "30 9 * * *"   # 06h30 BRT, meia hora depois do sync Organizze

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Rodar sync Inter PJ
        env:
          # --- Secrets (você cadastra no GitHub a partir da integração do Inter) ---
          INTER_CLIENT_ID: ${{ secrets.INTER_CLIENT_ID }}
          INTER_CLIENT_SECRET: ${{ secrets.INTER_CLIENT_SECRET }}
          INTER_CERT_B64: ${{ secrets.INTER_CERT_B64 }}
          INTER_KEY_B64: ${{ secrets.INTER_KEY_B64 }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # --- Config não-sigilosa (fixa no arquivo, igual ao sync Organizze) ---
          SUPABASE_URL: https://mieqsiojvfiqrhectquc.supabase.co
          INTER_CONTA_ID: eac4907f-6e1a-4326-894f-ffacf25c04f6   # conta "Inter PJ" na tabela contas
          INTER_VISAO: PJ
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          SYNC_DAYS: ${{ github.event.inputs.sync_days || '7' }}
        run: node scripts/sync-inter.mjs
