name: Sync Pluggy (Nubank/Inter PF/C6) → Supabase

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN (true = só simula, false = grava)"
        required: false
        default: "true"
      discover:
        description: "DISCOVER (true = só lista accounts/saldos + contas do app pra mapear conta_id)"
        required: false
        default: "false"
      item_ids:
        description: "item_ids avulsos (vírgula) — com DISCOVER, dispensa pluggy_conexoes"
        required: false
        default: ""
      mapping:
        description: "MAPPING JSON [{item_id,conta_id,visao,banco}] — só grava pluggy_conexoes e sai"
        required: false
        default: ""
      sync_days:
        description: "Quantos dias pra trás"
        required: false
        default: "90"
  # Piloto automático: DESLIGADO até cadastrar os secrets PLUGGY_* (sem eles o run
  # falha e gera e-mail de erro). Rota gratuita Meu Pluggy: siga scripts/PLUGGY.md,
  # cadastre os secrets e DESCOMENTE o bloco abaixo pra ligar o cron diário (06h40 BRT).
  # O sync tenta PATCH /items (se negado pós-trial, lê o dado diário do MeuPluggy).
  # schedule:
  #   - cron: "40 9 * * *"   # 09:40 UTC = 06:40 BRT

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Rodar sync Pluggy
        env:
          # --- Secrets (cadastre no GitHub a partir de dashboard.pluggy.ai) ---
          PLUGGY_CLIENT_ID: ${{ secrets.PLUGGY_CLIENT_ID }}
          PLUGGY_CLIENT_SECRET: ${{ secrets.PLUGGY_CLIENT_SECRET }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # --- Config não-sigilosa (fixa, igual aos outros syncs) ---
          SUPABASE_URL: https://mieqsiojvfiqrhectquc.supabase.co
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          DISCOVER: ${{ github.event.inputs.discover || 'false' }}
          ITEM_IDS: ${{ github.event.inputs.item_ids || '' }}
          MAPPING: ${{ github.event.inputs.mapping || '' }}
          SYNC_DAYS: ${{ github.event.inputs.sync_days || '7' }}
        run: node scripts/sync-pluggy.mjs
